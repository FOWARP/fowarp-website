<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOWARP</title>
  <style>
    @font-face {
      font-family: 'Karlsbader Grotesk';
      src: url('/fonts/KarlsbaderGrotesk-400.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    :root { --vw: 19.2px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.35s ease;
    }

    .chip {
      position: fixed;
      padding: calc(var(--vw) * 0.521) calc(var(--vw) * 1.042);
      border-radius: calc(var(--vw) * 0.313);
      font-family: 'Karlsbader Grotesk', sans-serif;
      font-size: calc(var(--vw) * 1.25);
      font-weight: 400;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #tagline {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: calc(var(--vw) * 0.833);
      font-family: 'Karlsbader Grotesk', sans-serif;
      font-size: calc(var(--vw) * 3.333);
      font-weight: 400;
      color: #fff;
      mix-blend-mode: difference;
      letter-spacing: calc(var(--vw) * -0.067);
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      transition: font-size 0.45s cubic-bezier(0.2, 0, 0, 1),
                  letter-spacing 0.45s cubic-bezier(0.2, 0, 0, 1);
    }

    #tagline.scaled {
      font-size: calc(var(--vw) * 6.458);
      letter-spacing: calc(var(--vw) * -0.129);
    }

    .word {
      opacity: 0;
      transform: translateY(calc(var(--vw) * 0.8));
      transition: opacity 0.22s cubic-bezier(0.25, 0, 0.25, 1),
                  transform 0.22s cubic-bezier(0.25, 0, 0.25, 1);
    }

    .word.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="tagline">
    <span class="word">Move</span>
    <span class="word">Forward</span>
    <span class="word">like a</span>
    <span class="word">Warp</span>
  </div>

  <script>
    function setVW() {
      var vw = Math.min(window.innerWidth, 1920) / 100;
      document.documentElement.style.setProperty('--vw', vw + 'px');
    }
    setVW();
    window.addEventListener('resize', setVW);

    // Figma 고정 위치 (1920×1080 기준 vw/vh %)
    var CHIPS = [
      { text: 'BRAND IDENTITY', color: '#a600ce', x: 14.84, y: 23.89 },
      { text: 'PACKAGE',        color: '#009da0', x: 24.69, y: 30.65 },
      { text: 'UI/UX',          color: '#15a000', x: 41.82, y: 66.30 },
      { text: 'DETAIL PAGE',    color: '#606060', x: 35.16, y: 13.61 },
      { text: 'BROCHURE',       color: '#8da600', x: 50.00, y: 84.91 },
      { text: '3D VISUAL',      color: '#3355ff', x: 62.29, y: 19.35 },
      { text: 'Motion Graphic', color: '#e65010', x: 30.63, y: 73.52 },
      { text: 'Generative AI',  color: '#9d33ff', x: 53.39, y: 26.11 },
      { text: 'POSTER',         color: '#f416c1', x: 71.46, y: 74.44 },
      { text: 'BRAND STRATEGY', color: '#bb2c2e', x: 72.34, y: 66.30 },
      { text: 'BRAND GUIDE',    color: '#005f50', x: 75.10, y: 36.76 },
      { text: 'website',        color: '#e0256c', x: 11.93, y: 66.30 },
    ];

    var WORD_DELAYS = [200, 380, 560, 740];
    var OUT_START   = 850;
    var SCALE_START = 850;
    var NAV_TIME    = 1500;
    var PREVIEW     = location.search.includes('preview');

    var tagline = document.getElementById('tagline');
    var words   = tagline.querySelectorAll('.word');

    var chipEls = CHIPS.map(function(c) {
      var el = document.createElement('div');
      el.className = 'chip';
      el.textContent = c.text;
      el.style.background = c.color;
      el.style.left = c.x + 'vw';
      el.style.top  = c.y + 'vh';
      document.body.appendChild(el);
      return el;
    });

    var startTs   = null;
    var wordShown = [false, false, false, false];
    var done      = { out: false, scale: false, nav: false };
    var raf;

    function tick(ts) {
      if (!startTs) startTs = ts;
      var t = ts - startTs;

      // 칩 순서대로 페이드인
      chipEls.forEach(function(el, i) {
        if (!el._in) {
          var p = Math.min(1, Math.max(0, (t - i * 20) / 120));
          el.style.opacity = p;
          if (p >= 1) el._in = true;
        }
      });

      // 단어 순차 등장
      WORD_DELAYS.forEach(function(delay, i) {
        if (!wordShown[i] && t >= delay) {
          words[i].classList.add('show');
          wordShown[i] = true;
        }
      });

      // 칩 페이드아웃 + 배경 → 흰색
      if (t >= OUT_START && !done.out) {
        done.out = true;
        chipEls.forEach(function(el) { el.style.opacity = '0'; });
        document.body.style.background = '#fff';
      }

      // 타이틀 확대
      if (t >= SCALE_START && !done.scale) {
        done.scale = true;
        tagline.classList.add('scaled');
      }

      // 이동
      if (!PREVIEW && t >= NAV_TIME && !done.nav) {
        done.nav = true;
        sessionStorage.setItem('fromIntro', '1');
        window.location.href = '/project';
        return;
      }

      raf = requestAnimationFrame(tick);
    }

    raf = requestAnimationFrame(tick);
  </script>
</body>
</html>
