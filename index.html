<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOWARP</title>
  <style>
    @font-face {
      font-family: 'Karlsbader Grotesk';
      src: url('/fonts/KarlsbaderGrotesk-400.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    :root { --vw: 19.2px; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #intro {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .chip {
      position: absolute;
      padding: calc(var(--vw) * 0.521) calc(var(--vw) * 1.042);
      border-radius: calc(var(--vw) * 0.313);
      font-family: 'Karlsbader Grotesk', sans-serif;
      font-size: calc(var(--vw) * 1.25);
      font-weight: 400;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      will-change: transform, opacity;
    }

    #tagline {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: calc(var(--vw) * 0.833);
      font-family: 'Karlsbader Grotesk', sans-serif;
      font-size: calc(var(--vw) * 3.333);
      font-weight: 400;
      color: #fff;
      letter-spacing: calc(var(--vw) * -0.067);
      white-space: nowrap;
      pointer-events: none;
    }

    .word {
      opacity: 0;
      transform: translateY(calc(var(--vw) * 1.25));
      transition: opacity 0.55s cubic-bezier(0.25, 0, 0.25, 1),
                  transform 0.55s cubic-bezier(0.25, 0, 0.25, 1);
    }

    .word.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="intro">
    <div id="tagline">
      <span class="word">Move</span>
      <span class="word">Forward</span>
      <span class="word">like a</span>
      <span class="word">Warp</span>
    </div>
  </div>

  <script>
    function setVW() {
      const vw = Math.min(window.innerWidth, 1920) / 100;
      document.documentElement.style.setProperty('--vw', vw + 'px');
    }
    setVW();
    window.addEventListener('resize', setVW);

    const CHIPS = [
      { text: 'BRAND IDENTITY', color: '#a600ce' },
      { text: 'PACKAGE',        color: '#009da0' },
      { text: 'UI/UX',          color: '#15a000' },
      { text: 'DETAIL PAGE',    color: '#606060' },
      { text: 'BROCHURE',       color: '#8da600' },
      { text: '3D VISUAL',      color: '#3355ff' },
      { text: 'Motion Graphic', color: '#e65010' },
      { text: 'Generative AI',  color: '#9d33ff' },
      { text: 'POSTER',         color: '#f416c1' },
      { text: 'BRAND STRATEGY', color: '#bb2c2e' },
      { text: 'BRAND GUIDE',    color: '#005f50' },
      { text: 'website',        color: '#e0256c' },
    ];

    const PREVIEW     = location.search.includes('preview');
    const WORD_DELAYS = [700, 1200, 1700, 2200];
    const INTRO_FADE  = PREVIEW ? 999999 : 3800;
    const FADE_DUR    = 700;

    const intro   = document.getElementById('intro');
    const tagline = document.getElementById('tagline');
    const words   = tagline.querySelectorAll('.word');

    const chipState = [];

    function rand(min, max) { return min + Math.random() * (max - min); }

    function spawnChips() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const CX = W / 2, CY = H / 2;
      const AVOID = 280;

      CHIPS.forEach((c) => {
        const el = document.createElement('div');
        el.className = 'chip';
        el.textContent = c.text;
        el.style.background = c.color;
        intro.insertBefore(el, tagline);

        let x, y, tries = 0;
        do {
          x = rand(0.04 * W, 0.85 * W);
          y = rand(0.06 * H, 0.85 * H);
          tries++;
        } while (tries < 60 && Math.hypot(x - CX, y - CY) < AVOID);

        const speed = rand(0.18, 0.38);
        const angle = rand(0, Math.PI * 2);

        chipState.push({
          el,
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          phase: rand(0, Math.PI * 2),
        });

        el.style.left = x + 'px';
        el.style.top  = y + 'px';
      });
    }

    spawnChips();

    let startTs   = null;
    let wordShown = CHIPS.map(() => false).slice(0, 4);
    let raf;

    function tick(ts) {
      if (!startTs) startTs = ts;
      const elapsed = ts - startTs;

      const W = window.innerWidth;
      const H = window.innerHeight;

      chipState.forEach((c, i) => {
        const fadeStart = i * 55;
        const fadeEnd   = fadeStart + 380;
        c.el.style.opacity = Math.min(1, Math.max(0, (elapsed - fadeStart) / (fadeEnd - fadeStart)));

        c.phase += 0.009;
        c.x += c.vx + Math.sin(c.phase + i * 0.7) * 0.12;
        c.y += c.vy + Math.cos(c.phase * 0.8 + i) * 0.12;

        const cw = c.el.offsetWidth  || 140;
        const ch = c.el.offsetHeight || 46;
        if (c.x < 0)     { c.x = 0;     c.vx =  Math.abs(c.vx); }
        if (c.x > W - cw){ c.x = W - cw; c.vx = -Math.abs(c.vx); }
        if (c.y < 0)     { c.y = 0;     c.vy =  Math.abs(c.vy); }
        if (c.y > H - ch){ c.y = H - ch; c.vy = -Math.abs(c.vy); }

        c.el.style.left = c.x + 'px';
        c.el.style.top  = c.y + 'px';
      });

      WORD_DELAYS.forEach((delay, i) => {
        if (!wordShown[i] && elapsed >= delay) {
          words[i].classList.add('show');
          wordShown[i] = true;
        }
      });

      if (elapsed >= INTRO_FADE) {
        const p = Math.min(1, (elapsed - INTRO_FADE) / FADE_DUR);
        intro.style.opacity = 1 - p;
        if (p >= 1) {
          cancelAnimationFrame(raf);
          window.location.href = '/project';
          return;
        }
      }

      raf = requestAnimationFrame(tick);
    }

    raf = requestAnimationFrame(tick);
  </script>
</body>
</html>
