<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOWARP — Social</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <style>
    @font-face {
      font-family: 'Karlsbader Grotesk';
      src: url('/fonts/KarlsbaderGrotesk-400.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    :root { --vw: 19.2px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

    /* ─── HEADER ─────────────────────────────── */
    .header { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; background: rgba(255,255,255,0.9); }

    .marquee-section {
      width: 100%;
      padding: calc(var(--vw) * 1.042) calc(var(--vw) * 4.167) 0;
      background: rgba(255,255,255,0.9);
    }
    .marquee-bar { width: 100%; overflow-x: hidden; }
    .marquee-bar-inner {
      background: #000; width: 100%;
      height: calc(var(--vw) * 2.083);
      display: flex; align-items: center;
    }
    .marquee-track { display: flex; align-items: center; white-space: nowrap; will-change: transform; }
    .marquee-set {
      display: flex; align-items: center;
      gap: calc(var(--vw) * 5.208);
      padding-right: calc(var(--vw) * 5.208);
      flex-shrink: 0;
    }
    .marquee-text { font-family: Arial, sans-serif; font-size: calc(var(--vw) * 0.729); color: #fff; white-space: nowrap; }
    .marquee-logo { height: calc(var(--vw) * 0.852); width: auto; display: block; filter: invert(1); }

    .header-main {
      width: 100%; height: calc(var(--vw) * 5.208);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 calc(var(--vw) * 4.167); position: relative;
    }
    .header-logo-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      height: calc(var(--vw) * 1.4); width: auto; display: block;
    }
    .header-nav { display: flex; gap: calc(var(--vw) * 4.167); align-items: center; }
    .header-nav a {
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      text-decoration: none; color: #999796; text-transform: capitalize;
    }
    .header-nav a.active { color: #000; }
    .header-cta {
      background: #000; color: #fff;
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      padding: calc(var(--vw) * 0.625) calc(var(--vw) * 0.729);
      border-radius: calc(var(--vw) * 0.417);
      text-decoration: none; text-transform: capitalize; white-space: nowrap;
    }

    /* ─── PAGE ───────────────────────────────── */
    .page-body {
      padding-top: calc(var(--vw) * 13.854);
      padding-left: calc(var(--vw) * 4.167);
      padding-right: calc(var(--vw) * 4.167);
      padding-bottom: calc(var(--vw) * 6.25);
    }

    /* ─── SECTION HEADER ─────────────────────── */
    .social-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: calc(var(--vw) * 2.083);
      border-bottom: 1px solid #000;
    }

    .social-page-title {
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 6.25);
      font-weight: 400;
      line-height: 0.88;
      text-transform: uppercase;
      color: #000;
      letter-spacing: -0.02em;
    }

    .social-page-desc {
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 0.729);
      color: #999796;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-bottom: calc(var(--vw) * 0.521);
    }

    /* ─── SOCIAL LIST ────────────────────────── */
    .social-list {
      list-style: none;
    }

    .social-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--vw) * 1.875) 0;
      border-bottom: 1px solid #000;
      text-decoration: none;
      color: #000;
      transition: background 0.18s ease;
      cursor: pointer;
    }

    .social-item:hover {
      background: #000;
      padding-left: calc(var(--vw) * 1.563);
      padding-right: calc(var(--vw) * 1.563);
      margin-left: calc(var(--vw) * -1.563);
      margin-right: calc(var(--vw) * -1.563);
      border-bottom-color: transparent;
    }

    .social-item:hover .social-name,
    .social-item:hover .social-index,
    .social-item:hover .social-handle,
    .social-item:hover .social-arrow { color: #fff; }

    .social-left {
      display: flex;
      align-items: baseline;
      gap: calc(var(--vw) * 1.563);
    }

    .social-index {
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 0.625);
      color: #999796;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.18s ease;
    }

    .social-name {
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 3.125);
      font-weight: 400;
      line-height: 1;
      text-transform: uppercase;
      color: #000;
      transition: color 0.18s ease;
    }

    .social-right {
      display: flex;
      align-items: center;
      gap: calc(var(--vw) * 3.125);
    }

    .social-handle {
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 0.833);
      color: #999796;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.18s ease;
    }

    .social-arrow {
      font-family: 'Karlsbader Grotesk', Arial, sans-serif;
      font-size: calc(var(--vw) * 1.563);
      color: #000;
      transition: color 0.18s ease;
    }

    /* ─── SCROLL REVEAL ──────────────────────── */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.9s ease, transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <header class="header">
    <div class="marquee-section">
      <div class="marquee-bar">
        <div class="marquee-bar-inner">
          <div class="marquee-track" id="marqueeTrack">
            <div class="marquee-set">
              <span class="marquee-text">Brand Strategy &amp; Design Agency</span>
              <img class="marquee-logo" src="/media/fowarp-logo-marquee.svg" alt="FOWARP">
              <span class="marquee-text">브랜드 전략 &amp; 디자인 에이전시</span>
              <img class="marquee-logo" src="/media/fowarp-logo-marquee.svg" alt="FOWARP">
              <span class="marquee-text">Brand Strategy &amp; Design Agency</span>
              <img class="marquee-logo" src="/media/fowarp-logo-marquee.svg" alt="FOWARP">
              <span class="marquee-text">브랜드 전략 &amp; 디자인 에이전시</span>
              <img class="marquee-logo" src="/media/fowarp-logo-marquee.svg" alt="FOWARP">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="header-main">
      <nav class="header-nav">
        <a href="/portfolio">Project</a>
        <a href="/about">About</a>
        <a href="/social" class="active">Social</a>
      </nav>
      <a href="/portfolio"><img class="header-logo-center" src="/media/fowarp-logo-center.svg" alt="FOWARP"></a>
      <a href="/contact" class="header-cta">Get in Touch</a>
    </div>
  </header>

  <div class="page-body">

    <div class="social-header reveal">
      <h1 class="social-page-title">Social</h1>
      <p class="social-page-desc">Follow our work</p>
    </div>

    <ul class="social-list">
      <li class="reveal" style="transition-delay:0.06s">
        <a class="social-item" href="https://www.instagram.com/fowarp" target="_blank" rel="noopener">
          <div class="social-left">
            <span class="social-index">01</span>
            <span class="social-name">Instagram</span>
          </div>
          <div class="social-right">
            <span class="social-handle">@fowarp</span>
            <span class="social-arrow">→</span>
          </div>
        </a>
      </li>
      <li class="reveal" style="transition-delay:0.12s">
        <a class="social-item" href="#">
          <div class="social-left">
            <span class="social-index">02</span>
            <span class="social-name">Behance</span>
          </div>
          <div class="social-right">
            <span class="social-handle">fowarp</span>
            <span class="social-arrow">→</span>
          </div>
        </a>
      </li>
      <li class="reveal" style="transition-delay:0.18s">
        <a class="social-item" href="#">
          <div class="social-left">
            <span class="social-index">03</span>
            <span class="social-name">LinkedIn</span>
          </div>
          <div class="social-right">
            <span class="social-handle">fowarp</span>
            <span class="social-arrow">→</span>
          </div>
        </a>
      </li>
      <li class="reveal" style="transition-delay:0.24s">
        <a class="social-item" href="#">
          <div class="social-left">
            <span class="social-index">04</span>
            <span class="social-name">YouTube</span>
          </div>
          <div class="social-right">
            <span class="social-handle">@fowarp</span>
            <span class="social-arrow">→</span>
          </div>
        </a>
      </li>
    </ul>

  </div>

  <script>
    function updateVW() {
      var w = Math.min(window.innerWidth, 1920);
      document.documentElement.style.setProperty('--vw', (w / 100) + 'px');
    }
    updateVW();
    window.addEventListener('resize', updateVW);

    var lenis = new Lenis({
      duration: 0.9,
      easing: function(t) { return 1 - Math.pow(1 - t, 4); },
      smoothWheel: true
    });
    function lenisRaf(time) { lenis.raf(time); requestAnimationFrame(lenisRaf); }
    requestAnimationFrame(lenisRaf);

    (function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal').forEach(function(el) { observer.observe(el); });
    })();

    (function() {
      var track = document.getElementById('marqueeTrack');
      var set = track.querySelector('.marquee-set');
      var pos = 0, speed = 0.6, setWidth = 0, raf;
      function fillClones() {
        while (track.children.length > 1) track.removeChild(track.lastChild);
        setWidth = set.offsetWidth;
        var copies = Math.ceil(window.innerWidth / setWidth) + 1;
        for (var i = 0; i < copies; i++) track.appendChild(set.cloneNode(true));
      }
      function tick() {
        pos -= speed;
        if (pos <= -setWidth) pos += setWidth;
        track.style.transform = 'translateX(' + pos + 'px)';
        raf = requestAnimationFrame(tick);
      }
      fillClones(); tick();
      window.addEventListener('load', function() { cancelAnimationFrame(raf); fillClones(); tick(); });
      window.addEventListener('resize', function() { cancelAnimationFrame(raf); updateVW(); setTimeout(function() { fillClones(); tick(); }, 50); });
    })();
  </script>
</body>
</html>
